<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&amp;family=Inter:wght@400;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#003915",
                        "on-surface-variant": "#bccbb9",
                        "tertiary": "#afc7ff",
                        "inverse-surface": "#dae2fd",
                        "primary-container": "#22c55e",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#d8e2ff",
                        "on-primary-fixed-variant": "#005321",
                        "on-background": "#dae2fd",
                        "surface-container-high": "#222a3d",
                        "on-primary-container": "#004b1e",
                        "primary": "#4be277",
                        "inverse-on-surface": "#283044",
                        "on-primary-fixed": "#002109",
                        "secondary": "#ffb3ad",
                        "secondary-container": "#a40217",
                        "primary-fixed": "#6bff8f",
                        "on-secondary": "#68000a",
                        "surface-variant": "#2d3449",
                        "on-secondary-fixed-variant": "#930013",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-error": "#690005",
                        "surface-tint": "#4ae176",
                        "surface": "#0b1326",
                        "inverse-primary": "#006e2f",
                        "on-tertiary-fixed": "#001a42",
                        "secondary-fixed": "#ffdad7",
                        "tertiary-fixed-dim": "#adc6ff",
                        "outline": "#869585",
                        "surface-container-highest": "#2d3449",
                        "surface-dim": "#0b1326",
                        "on-secondary-fixed": "#410004",
                        "surface-container": "#171f33",
                        "background": "#0b1326",
                        "outline-variant": "#3d4a3d",
                        "primary-fixed-dim": "#4ae176",
                        "error-container": "#93000a",
                        "tertiary-container": "#82abff",
                        "on-tertiary-container": "#003d88",
                        "surface-container-lowest": "#060e20",
                        "on-secondary-container": "#ffaea8",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#31394d",
                        "secondary-fixed-dim": "#ffb3ad",
                        "on-tertiary": "#002e6a",
                        "on-surface": "#dae2fd",
                        "surface-container-low": "#131b2e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "md": "16px",
                        "margin-desktop": "32px",
                        "sm": "8px",
                        "unit": "4px",
                        "margin-mobile": "12px",
                        "xl": "40px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "ticker-text": ["Archivo Narrow"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Archivo Narrow"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Archivo Narrow"],
                        "display-score": ["Archivo Narrow"],
                        "headline-md": ["Archivo Narrow"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "ticker-text": ["14px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "display-score": ["48px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        /* OBS Overlay specific: Transparent Background */
        body {
            background-color: transparent !important;
        }
        
        .glass-ticker {
            background: rgba(6, 14, 32, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .pulse-live {
            animation: pulse-red 2s infinite;
        }
        
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .score-update-flash {
            animation: flash-update 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes flash-update {
            0% { background-color: transparent; }
            30% { background-color: rgba(75, 226, 119, 0.3); }
            100% { background-color: transparent; }
        }

        .striker-glow {
            box-shadow: inset 3px 0 0 0 #4be277;
        }

        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Hide UI elements if transparent mode is active for cleaner OBS capture */
        .obs-mode-hidden {
            display: none !important;
        }
    </style>
</head>
<body class="text-on-surface font-body-md overflow-hidden h-screen w-screen flex flex-col justify-end items-center p-lg">
<!-- PREVIEW BACKGROUND (Toggleable for OBS) -->
<div class="fixed inset-0 -z-10 bg-surface-dim" id="preview-bg">
<img alt="Stadium background" class="w-full h-full object-cover opacity-30" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCf5fyWnOW9Qk8pLcdn4AptH8NEVg8aq-lv2WByuySMAi4-nuRWYnA6hxnzQ53ZAUMFuuxx5HKG62mXBbGhJeH3Y61XiO7oqrIWgvpyYRB2411POCwYsd7kDGyby9lfjnzSvtkrZKnpXoxHxjLUBac3uvLRgP85tb1hRLib3gfB063867zrTPSqIECe0XocKChu0YN6NfSKbU_F_64Mmr8uWn4UNQb8aemS0uESE0bl_ugAHWxX4egcvJiO2BxOWm8NkxqW4bsGd1ue"/>
</div>
<!-- MAIN BROADCAST TICKER -->
<div class="w-full max-w-7xl flex flex-col items-center gap-xs">
<!-- Recent Balls Bar -->
<div class="flex gap-xs self-start ml-2 mb-0.5">
<div class="bg-surface-container-highest/90 backdrop-blur-md px-sm py-1 rounded-t-lg border-t border-x border-outline-variant/50 flex items-center gap-xs" id="recent-balls-container">
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-wider">Recent</span>
<div class="flex gap-1 items-center ml-1" id="ball-history">
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-surface-variant text-[9px] font-bold">1</span>
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container text-[9px] font-bold">4</span>
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-surface-variant text-[9px] font-bold">0</span>
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-secondary-container text-on-secondary-container text-[9px] font-bold">W</span>
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-surface-variant text-[9px] font-bold">1</span>
<span class="w-5 h-5 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container text-[9px] font-bold">6</span>
</div>
</div>
</div>
<!-- Main Score Ticker Shell -->
<div class="glass-ticker w-full h-[56px] border border-outline-variant/40 rounded-xl flex items-stretch overflow-hidden shadow-2xl relative" id="main-ticker">
<!-- Flash Overlay Layer -->
<div class="absolute inset-0 pointer-events-none" id="ticker-flash"></div>
<!-- Left: Team & Score -->
<div class="flex items-center px-md bg-primary/10 border-r border-outline-variant/30 relative overflow-hidden min-w-[180px]">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<div class="flex items-baseline gap-2">
<span class="font-headline-md text-headline-md font-bold tracking-tighter text-primary" id="team-name">IND</span>
<span class="font-display-score text-[40px] leading-none" id="score-main">150<span class="text-on-surface-variant font-light text-[24px]">/4</span></span>
</div>
</div>
<!-- Left Center: Overs -->
<div class="flex flex-col justify-center px-md border-r border-outline-variant/20 bg-surface-container-low/30">
<span class="font-label-caps text-[9px] text-on-surface-variant leading-tight uppercase">Overs</span>
<span class="font-headline-md text-[18px] leading-none" id="overs-count">15.2</span>
</div>
<!-- Center: Active Batsmen -->
<div class="flex-1 flex items-center px-md gap-lg">
<!-- Batsman 1 (Striker) -->
<div class="flex flex-col striker-glow pl-md" id="batsman-1-row">
<div class="flex items-center gap-xs">
<span class="font-ticker-text text-[13px] text-on-surface font-bold uppercase tracking-tight" id="batsman-1-name">V. KOHLI</span>
<span class="material-symbols-outlined text-[14px] text-primary" data-weight="fill">sports_cricket</span>
</div>
<div class="flex items-baseline gap-xs">
<span class="font-headline-md text-[18px] leading-none text-primary" id="batsman-1-runs">45</span>
<span class="font-ticker-text text-[12px] text-on-surface-variant" id="batsman-1-balls">(32)</span>
</div>
</div>
<!-- Batsman 2 -->
<div class="flex flex-col opacity-60" id="batsman-2-row">
<span class="font-ticker-text text-[13px] text-on-surface font-bold uppercase tracking-tight" id="batsman-2-name">R. SHARMA</span>
<div class="flex items-baseline gap-xs">
<span class="font-headline-md text-[18px] leading-none" id="batsman-2-runs">12</span>
<span class="font-ticker-text text-[12px] text-on-surface-variant" id="batsman-2-balls">(10)</span>
</div>
</div>
</div>
<!-- Right Center: Bowler -->
<div class="flex items-center px-md border-l border-outline-variant/20 bg-surface-container-low/50">
<div class="flex flex-col items-end mr-sm">
<span class="font-label-caps text-[9px] text-on-surface-variant uppercase tracking-tighter">Bowling</span>
<span class="font-ticker-text text-[13px] text-on-surface font-bold uppercase" id="bowler-name">M. STARC</span>
</div>
<div class="flex flex-col items-center">
<span class="font-headline-md text-[18px] text-secondary leading-none" id="bowler-stats">2/34</span>
<span class="font-ticker-text text-[10px] text-on-surface-variant uppercase" id="bowler-overs">3.2 OV</span>
</div>
</div>
<!-- Extreme Right: Run Rates & Context -->
<div class="flex items-center px-md bg-surface-container-highest/40 gap-md">
<div class="flex flex-col items-center min-w-[40px]">
<span class="font-label-caps text-[9px] text-on-surface-variant">CRR</span>
<span class="font-ticker-text text-[14px] font-bold text-primary" id="crr">9.78</span>
</div>
<div class="flex flex-col items-center min-w-[50px]">
<span class="font-label-caps text-[9px] text-on-surface-variant">TARGET</span>
<span class="font-ticker-text text-[14px] font-bold" id="target">186</span>
</div>
<!-- Live Tag -->
<div class="flex items-center gap-xs bg-secondary-container/30 px-sm py-1 rounded border border-secondary/20">
<div class="w-1.5 h-1.5 rounded-full bg-secondary pulse-live"></div>
<span class="font-label-caps text-[10px] text-secondary font-bold">LIVE</span>
</div>
</div>
</div>
</div>
<!-- TOP CONTROLS (Internal / Toggleable) -->
<div class="fixed top-0 left-0 w-full p-md flex justify-between items-start pointer-events-none transition-opacity duration-300" id="overlay-controls">
<div class="flex gap-sm pointer-events-auto">
<button class="bg-surface-container glass-ticker border border-outline-variant px-md py-sm rounded-lg flex items-center gap-sm hover:bg-surface-container-high transition-colors" id="toggle-bg">
<span class="material-symbols-outlined text-primary">visibility</span>
<span class="font-label-caps text-label-caps uppercase">Toggle Background</span>
</button>
<button class="bg-surface-container glass-ticker border border-outline-variant px-md py-sm rounded-lg flex items-center gap-sm hover:bg-surface-container-high transition-colors" id="manual-update">
<span class="material-symbols-outlined text-on-surface-variant">refresh</span>
<span class="font-label-caps text-label-caps uppercase">Test Update</span>
</button>
</div>
<div class="flex flex-col items-end pointer-events-auto">
<div class="bg-surface-container-lowest glass-ticker border border-outline-variant px-md py-sm rounded-lg mb-sm">
<div class="flex items-center gap-md">
<div class="flex flex-col items-end">
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase">Data Stream</span>
<span class="font-ticker-text text-primary text-[12px]" id="stream-status">REAL-TIME ACTIVE</span>
</div>
<span class="material-symbols-outlined text-primary animate-pulse">broadcast_on_home</span>
</div>
</div>
</div>
</div>
<!-- SCRIPTS FOR INTERACTIVITY -->
<script>
    // --- DATA STATE MANAGEMENT ---
    let scoreData = {
        team: "IND",
        runs: 150,
        wickets: 4,
        overs: 15,
        balls: 2,
        batsmen: [
            { name: "V. KOHLI", runs: 45, balls: 32, striker: true },
            { name: "R. SHARMA", runs: 12, balls: 10, striker: false }
        ],
        bowler: { name: "M. STARC", wickets: 2, runs: 34, overs: 3.2 },
        crr: "9.78",
        target: "186",
        recent: ["1", "4", "0", "W", "1", "6"]
    };

    // DOM Elements
    const elements = {
        team: document.getElementById('team-name'),
        score: document.getElementById('score-main'),
        overs: document.getElementById('overs-count'),
        b1Name: document.getElementById('batsman-1-name'),
        b1Runs: document.getElementById('batsman-1-runs'),
        b1Balls: document.getElementById('batsman-1-balls'),
        b1Row: document.getElementById('batsman-1-row'),
        b2Name: document.getElementById('batsman-2-name'),
        b2Runs: document.getElementById('batsman-2-runs'),
        b2Balls: document.getElementById('batsman-2-balls'),
        b2Row: document.getElementById('batsman-2-row'),
        bowlerName: document.getElementById('bowler-name'),
        bowlerStats: document.getElementById('bowler-stats'),
        bowlerOvers: document.getElementById('bowler-overs'),
        crr: document.getElementById('crr'),
        target: document.getElementById('target'),
        history: document.getElementById('ball-history'),
        flash: document.getElementById('ticker-flash'),
        bg: document.getElementById('preview-bg'),
        controls: document.getElementById('overlay-controls')
    };

    function renderScoreboard(isUpdate = false) {
        if (isUpdate) {
            elements.flash.classList.remove('score-update-flash');
            void elements.flash.offsetWidth; // Trigger reflow
            elements.flash.classList.add('score-update-flash');
        }

        elements.team.textContent = scoreData.team;
        elements.score.innerHTML = `${scoreData.runs}<span class="text-on-surface-variant font-light text-[24px]">/${scoreData.wickets}</span>`;
        elements.overs.textContent = `${scoreData.overs}.${scoreData.balls}`;
        
        // Batsmen
        elements.b1Name.textContent = scoreData.batsmen[0].name;
        elements.b1Runs.textContent = scoreData.batsmen[0].runs;
        elements.b1Balls.textContent = `(${scoreData.batsmen[0].balls})`;
        elements.b1Row.classList.toggle('striker-glow', scoreData.batsmen[0].striker);
        elements.b1Row.classList.toggle('opacity-60', !scoreData.batsmen[0].striker);

        elements.b2Name.textContent = scoreData.batsmen[1].name;
        elements.b2Runs.textContent = scoreData.batsmen[1].runs;
        elements.b2Balls.textContent = `(${scoreData.batsmen[1].balls})`;
        elements.b2Row.classList.toggle('striker-glow', scoreData.batsmen[1].striker);
        elements.b2Row.classList.toggle('opacity-60', !scoreData.batsmen[1].striker);

        // Bowler
        elements.bowlerName.textContent = scoreData.bowler.name;
        elements.bowlerStats.textContent = `${scoreData.bowler.wickets}/${scoreData.bowler.runs}`;
        elements.bowlerOvers.textContent = `${scoreData.bowler.overs} OV`;

        // Rates
        elements.crr.textContent = scoreData.crr;
        elements.target.textContent = scoreData.target;

        // History
        elements.history.innerHTML = scoreData.recent.map(ball => {
            let bgColor = 'bg-surface-variant';
            let textColor = 'text-on-surface';
            if (ball === '4' || ball === '6') {
                bgColor = 'bg-primary-container';
                textColor = 'text-on-primary-container';
            } else if (ball === 'W') {
                bgColor = 'bg-secondary-container';
                textColor = 'text-on-secondary-container';
            }
            return `<span class="w-5 h-5 flex items-center justify-center rounded-full ${bgColor} ${textColor} text-[9px] font-bold">${ball}</span>`;
        }).join('');
    }

    // --- REAL-TIME LISTENERS ---
    
    // Listen for storage changes from another window (like a control panel)
    window.addEventListener('storage', (event) => {
        if (event.key === 'cricket_live_score') {
            try {
                const newData = JSON.parse(event.newValue);
                scoreData = { ...scoreData, ...newData };
                renderScoreboard(true);
            } catch (e) {
                console.error("Invalid data received via localStorage", e);
            }
        }
    });

    // Toggle Preview Background
    document.getElementById('toggle-bg').addEventListener('click', () => {
        elements.bg.classList.toggle('hidden');
    });

    // Manual test update for demonstration
    document.getElementById('manual-update').addEventListener('click', () => {
        scoreData.runs += Math.floor(Math.random() * 7);
        scoreData.balls++;
        if (scoreData.balls > 5) {
            scoreData.balls = 0;
            scoreData.overs++;
        }
        
        // Randomly update a batsman
        const strikerIdx = scoreData.batsmen[0].striker ? 0 : 1;
        scoreData.batsmen[strikerIdx].runs += 1;
        scoreData.batsmen[strikerIdx].balls += 1;

        // Push to localStorage so other tabs (if any) see it
        localStorage.setItem('cricket_live_score', JSON.stringify(scoreData));
        renderScoreboard(true);
    });

    // Hide controls after inactivity or if specific URL param is present
    let controlsTimer;
    function hideControls() {
        elements.controls.classList.add('opacity-0');
        elements.controls.classList.add('pointer-events-none');
    }
    
    function resetControlsTimer() {
        elements.controls.classList.remove('opacity-0');
        elements.controls.classList.remove('pointer-events-none');
        clearTimeout(controlsTimer);
        controlsTimer = setTimeout(hideControls, 3000);
    }

    document.addEventListener('mousemove', resetControlsTimer);
    resetControlsTimer();

    // Initial Render
    document.addEventListener('DOMContentLoaded', () => {
        renderScoreboard();
        // Load initial data from storage if exists
        const saved = localStorage.getItem('cricket_live_score');
        if (saved) {
            try {
                scoreData = JSON.parse(saved);
                renderScoreboard();
            } catch(e) {}
        }
    });
</script>
</body></html>
